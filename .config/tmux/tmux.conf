# =============================================================================
# Tmux Config -- Coding & Hacking Sessions
# ~/.config/tmux/tmux.conf
# =============================================================================

# ── Prefix ─────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g escape-time 0
set -g repeat-time 500
set -g focus-events on
set -g display-time 2000
set -g status-interval 5

# ── Vi mode ────────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi Escape send -X cancel

# ── Splits ─────────────────────────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Vim-style pane navigation ──────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize panes ───────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation ─────────────────────────────────────────────────────
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# ── Session management ─────────────────────────────────────────────────────
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind R command-prompt -p "Rename session:" "rename-session '%%'"

# ── Reload config ──────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Swap panes ─────────────────────────────────────────────────────────────
bind > swap-pane -D
bind < swap-pane -U

# ── Layouts (coding presets) ───────────────────────────────────────────────
# IDE layout: big editor left, two terminals right
bind M-i select-layout main-vertical
# Wide layout: editor top, terminals bottom
bind M-w select-layout main-horizontal
# Even grid
bind M-g select-layout tiled

# ── Coding session shortcuts ───────────────────────────────────────────────
# Quick lazygit popup
bind g display-popup -d "#{pane_current_path}" -w 90% -h 85% -E "lazygit"
# Quick btop popup
bind b display-popup -d "#{pane_current_path}" -w 90% -h 85% -E "btop"
# Quick file finder popup
bind f display-popup -d "#{pane_current_path}" -w 80% -h 70% -E "fzf --preview 'bat --color=always --style=numbers --line-range=:200 {}' | xargs -r nvim"

# ── Status bar (Tokyo Night + powerline) ──────────────────────────────────
set -g status-position top
set -g status-style "bg=default,fg=#c0caf5"
set -g status-left-length 50
set -g status-right-length 140

# Left: session badge with powerline arrow.
# Badge flips to red (#f7768e) when prefix is pressed — visual feedback
# that tmux is waiting for a follow-up key.
set -g status-left "\
#[bg=#{?client_prefix,#f7768e,#7aa2f7},fg=#1a1b26,bold]  #S \
#[bg=#3b4261,fg=#{?client_prefix,#f7768e,#7aa2f7}]\
#[bg=#3b4261,fg=#a9b1d6] #(whoami) \
#[bg=default,fg=#3b4261] "

# Right: git branch, RAM bar, loadavg, clock, date
set -g status-right "\
#[fg=#3b4261,bg=default]\
#[bg=#3b4261,fg=#9ece6a]  #(cd #{pane_current_path}; git branch --show-current 2>/dev/null || echo '-') \
#[bg=#24283b,fg=#3b4261]\
#[bg=#24283b,fg=#bb9af7]  #(~/.config/tmux/scripts/mem.sh) \
#[bg=#3b4261,fg=#24283b]\
#[bg=#3b4261,fg=#7dcfff]  #(cat /proc/loadavg | cut -d' ' -f1) \
#[bg=#3d59a1,fg=#3b4261]\
#[bg=#3d59a1,fg=#c0caf5,bold]  %H:%M \
#[bg=#7aa2f7,fg=#3d59a1]\
#[bg=#7aa2f7,fg=#1a1b26,bold] %d-%b "

# Window tabs: powerline style
setw -g window-status-format "\
#[fg=default,bg=#1f2335]\
#[fg=#545c7e,bg=#1f2335] #I  #W \
#[fg=#1f2335,bg=default]"

setw -g window-status-current-format "\
#[fg=default,bg=#24283b]\
#[fg=#7aa2f7,bg=#24283b,bold] #I  #W#{?window_zoomed_flag, ,} \
#[fg=#24283b,bg=default]"

setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#1f2335"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format " #P  #{pane_current_command} "

# Message style
set -g message-style "bg=#24283b,fg=#7aa2f7,bold"
set -g message-command-style "bg=#24283b,fg=#7aa2f7"

# Mode style (copy mode highlight)
setw -g mode-style "bg=#33467c,fg=#c0caf5,bold"

# Popup style
set -g popup-border-style "fg=#3b4261"
set -g popup-border-lines rounded

# ── pywal override (loaded after fallback so it wins when present) ────────
# ~/.cache/wal/colors-tmux.conf is regenerated on every `wallpaper <image>`
# run and re-sourced live into running servers by that same script.
if-shell "test -f ~/.cache/wal/colors-tmux.conf" \
  "source-file ~/.cache/wal/colors-tmux.conf"
