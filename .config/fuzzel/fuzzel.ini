# =============================================================================
# Fuzzel Launcher -- Dark Hacker Theme
# ~/.config/fuzzel/fuzzel.ini
# =============================================================================

[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=auto
prompt="  > "
icon-theme=Papirus-Dark
icons-enabled=yes
fields=name,generic,comment,categories,filename,keywords
terminal=kitty -e
layer=overlay
lines=12
width=45
horizontal-pad=12
vertical-pad=8
inner-pad=4
image-size-ratio=0.5
letter-spacing=0

# Background alpha = bb (~73%); fuzzel runs on the overlay layer, so when
# the compositor blurs that layer (noctalia enables it) you get frost.
[colors]
background=1a1b26bb
text=c0caf5ff
prompt=7aa2f7ff
placeholder=545c7eff
input=c0caf5ff
match=9ece6aff
selection=2e3c64cc
selection-text=c0caf5ff
selection-match=bb9af7ff
counter=545c7eff
border=7aa2f7cc

[border]
width=2
radius=16

[dmenu]
mode=text
exit-immediately-if-empty=no
